services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd1
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd1
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd1:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd1:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd1_data:/etcd-data
    networks: [pgnet]

  etcd2:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd2
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd2
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd2:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd2:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd2_data:/etcd-data
    networks: [pgnet]

  etcd3:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd3
    command: >
      /usr/local/bin/etcd
      --enable-v2=true
      --name etcd3
      --data-dir /etcd-data
      --initial-advertise-peer-urls http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380
      --advertise-client-urls http://etcd3:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-cluster-token patroni-etcd
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --initial-cluster-state new
    volumes:
      - etcd3_data:/etcd-data
    networks: [pgnet]

  patroni-primary:
    image: ghcr.io/zalando/spilo-15:3.2-p1
    container_name: patroni-primary
    environment:
      # Patroni/cluster
      SCOPE: marketplace
      PATRONI_SCOPE: marketplace
      PATRONI_NAME: patroni-primary

      # etcd (Patroni v2 API)
      ETCD_HOSTS: "etcd1:2379,etcd2:2379,etcd3:2379"
      PATRONI_ETCD_HOSTS: "etcd1:2379,etcd2:2379,etcd3:2379"

      # Postgres users
      PGUSER_SUPERUSER: postgres
      PGPASSWORD_SUPERUSER: postgres
      PGUSER_STANDBY: replicator
      PGPASSWORD_STANDBY: replicator_pass

      # DB name spilo требует (можно любое, мы всё равно создаём свои 3 БД скриптами)
      PGDATABASE: postgres

      # слушаем порт в контейнере
      PATRONI_POSTGRESQL_LISTEN: "0.0.0.0:5432"
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: "patroni-primary:5432"
      PATRONI_RESTAPI_LISTEN: "0.0.0.0:8008"
      PATRONI_RESTAPI_CONNECT_ADDRESS: "patroni-primary:8008"

      # Важно: хотим async-replica, значит synchronous_mode не включаем
      PATRONI_SYNCHRONOUS_MODE: "false"

    volumes:
      - spilo_primary_data:/home/postgres/pgdata
      - ./initdb:/initdb:ro
      - ./spilo/bootstrap:/docker-entrypoint-initdb.d:ro
    networks: [pgnet]
    depends_on: [etcd1, etcd2, etcd3]

  patroni-replica:
    image: ghcr.io/zalando/spilo-15:3.2-p1
    container_name: patroni-replica
    environment:
      SCOPE: marketplace
      PATRONI_SCOPE: marketplace
      PATRONI_NAME: patroni-replica

      ETCD_HOSTS: "etcd1:2379,etcd2:2379,etcd3:2379"
      PATRONI_ETCD_HOSTS: "etcd1:2379,etcd2:2379,etcd3:2379"

      PGUSER_SUPERUSER: postgres
      PGPASSWORD_SUPERUSER: postgres
      PGUSER_STANDBY: replicator
      PGPASSWORD_STANDBY: replicator_pass

      PGDATABASE: postgres

      PATRONI_POSTGRESQL_LISTEN: "0.0.0.0:5432"
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: "patroni-replica:5432"
      PATRONI_RESTAPI_LISTEN: "0.0.0.0:8008"
      PATRONI_RESTAPI_CONNECT_ADDRESS: "patroni-replica:8008"

      PATRONI_SYNCHRONOUS_MODE: "false"

    volumes:
      - spilo_replica_data:/home/postgres/pgdata
    networks: [pgnet]
    depends_on: [patroni-primary]

  haproxy:
    image: haproxy:2.9
    container_name: haproxy
    ports:
      - "5432:5432"
      - "6432:6432"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on: [patroni-primary, patroni-replica]
    networks: [pgnet]

  db-init:
    image: postgres:16
    container_name: db-init
    depends_on:
      - haproxy
    networks: [pgnet]
    volumes:
      - ./initdb:/initdb:ro
    environment:
      PGPASSWORD: postgres
    command: >
      bash -lc '
        set -euo pipefail;
  
        echo "Waiting for patroni-primary start...";
        until pg_isready -h haproxy -p 5432 -U postgres; do sleep 1; done;
  
        echo "Checking role...";
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -Atc "select pg_is_in_recovery();" | grep -qx "f";
  
        echo "Creating databases...";
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/01-create-databases.sql;
  
        echo "Run initdb scripts...";
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/10-user_service_db.sql;
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/20-order_service_db.sql;
        psql -h haproxy -p 5432 -U postgres -v ON_ERROR_STOP=1 -f /initdb/30-logistics_service_db.sql;
  
        echo "DB initializing is done.";
      '
    restart: "no"

networks:
  pgnet:

volumes:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  spilo_primary_data:
  spilo_replica_data: